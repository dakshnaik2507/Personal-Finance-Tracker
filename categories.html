{% extends "base.html" %}
{% block content %}

<h2>📂 Category Manager</h2>

<div class="card">
    <form method="POST">
        <input type="text" name="name" placeholder="Enter category">
        <button class="btn-success">Add</button>
    </form>
</div>

<div class="card">
    <h4>All Categories</h4>
    {% for c in data %}
        <p>📂 {{c.name}}</p>
    {% endfor %}
</div>

{% endblock %}
